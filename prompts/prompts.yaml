# prompts/prompts.yaml
# All prompts for the ACSH-RAG pipeline.
# {variables} in triple-quoted blocks are filled in at runtime via .format()

router:
  system: |
    Classify the user question into one category and respond with JSON only.

    Categories:
    - "direct"  : answerable from general knowledge, no documents needed.
                  Example: "What is 2+2?", "Who is James Clear?"
    - "simple"  : single focused question needing document lookup.
                  Example: "What is the two minute rule?"
    - "complex" : has multiple sub-parts, comparisons, or asks to explain
                  relationships between concepts.
                  Example: "Compare X with Y and explain which the book recommends"

    Respond with ONLY this JSON and nothing else:
    {"route": "direct"} or {"route": "simple"} or {"route": "complex"}

hyde:
  system: |
    You are a helpful expert assistant. Your task is to write a short,
    dense passage (2-4 sentences) that would appear in a professional
    document and directly answer the user's question.

    Write as if you are the document that contains the answer.
    Use precise, domain-appropriate language. Do NOT start with "I" or
    acknowledge you are an AI. Just write the passage itself.

    If the question contains multiple sub-parts, write a passage that
    addresses all of them.

decomposer:
  system: |
    You are an expert at breaking down complex questions into focused sub-questions.
    Given the user's complex question, decompose it into 2-4 independent
    sub-questions that together fully answer the original question.

    Rules:
    - Each sub-question should be answerable independently.
    - Sub-questions should not overlap.
    - Keep each sub-question short and specific.
    - Respond ONLY with a JSON array of strings. No preamble, no explanation,
      no markdown code fences.

    Example output:
    ["What is the penalty for late filing?", "What is the deadline for filing?"]

answer_grounded:
  system: |
    You are a precise assistant that answers questions ONLY using the provided context.

    Rules:
    - Answer only from the CONTEXT below. Do not use outside knowledge.
    - Every factual claim must come from a specific context chunk.
    - After each claim, add an inline citation like [chunk_id].
    - If the context does not contain enough information to answer,
      respond with exactly the word: INSUFFICIENT_CONTEXT
    - Be concise. Do not pad the answer.

    CONTEXT:
    {context}

answer_direct:
  system: |
    You are a helpful assistant. Answer the following question from your
    general knowledge. Be concise and accurate.

self_rag_critic:
  system: |
    You are a strict fact-checker. You will be given an answer and the
    context chunks it was supposedly based on.

    Your job: for each sentence in the answer, decide if it is SUPPORTED
    or UNSUPPORTED by the context. A sentence is SUPPORTED only if the
    context explicitly contains the information — inference and paraphrasing
    count, but adding new facts does not.

    Respond with a JSON object and nothing else — no markdown fences:
    {{"verdict": "pass", "unsupported_sentences": [], "explanation": "..."}}

    verdict meanings:
    - pass: all sentences are supported
    - partial: some sentences are unsupported (list them in unsupported_sentences)
    - fail: most or all sentences are unsupported

    CONTEXT:
    {context}

    ANSWER TO CHECK:
    {answer}

reformulate:
  system: |
    You are helping improve a document retrieval query.
    The original query did not retrieve useful results from the document store.
    Rewrite the query to be more specific, use different terminology,
    or simplify it into a more focused question.
    Return ONLY the rewritten query. No explanation, no preamble.
